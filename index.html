<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sophie Purewal</title>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
  >

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont,
                   'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #111;
      background-color: #fff;
    }

    /* Skip to content */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 16px;
      background: #000;
      color: #fff;
      padding: 8px 12px;
      text-decoration: none;
      z-index: 1000;
    }

    .skip-link:focus {
      top: 16px;
    }

    /* Header */
    .site-header {
      position: sticky;
      top: 0;
      background-color: #fff;
      border-bottom: 1px solid #e5e5e5;
      z-index: 100;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 40px;
    }

    .site-title {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.15em;
    }

    .nav-list {
      list-style: none;
      display: flex;
      gap: 24px;
      margin: 0;
      padding: 0;
    }

    .nav-list a {
      text-decoration: none;
      color: #111;
      font-size: 14px;
      font-weight: 500;
    }

    .nav-list a:hover,
    .nav-list a:focus-visible {
      text-decoration: underline;
    }

    /* Main */
    main {
      padding: 80px 40px;
      max-width: 960px;
    }

    section {
      margin-bottom: 120px;
      scroll-margin-top: 100px;
    }

    h2 {
      margin-top: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.015em;
    }

    p {
